<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto-Poster</title>
  <script src="config.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg:      #09090f;
      --surface: #0f0f17;
      --card:    #13131c;
      --border:  #1c1c2a;
      --border2: #242436;
      --text:    #e2e2f0;
      --muted:   #6e6e8a;
      --faint:   #3a3a52;
      --accent:  #e0693a;
      --accent2: rgba(224,105,58,.12);
      --green:   #3ecf8e;
      --green2:  rgba(62,207,142,.1);
      --red:     #ef4444;
      --red2:    rgba(239,68,68,.1);
      --blue:    #818cf8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Layout ── */
    .layout { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 20;
    }

    .sidebar-top {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700; letter-spacing: -.3px;
    }

    .logo-icon {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    nav { padding: 12px 8px; flex: 1; overflow-y: auto; }

    .nav-group { margin-bottom: 4px; }

    .nav-label {
      padding: 6px 8px 4px;
      font-size: 10px; font-weight: 600; letter-spacing: .7px;
      text-transform: uppercase; color: var(--faint);
    }

    .nav-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 7px 10px; border-radius: 6px;
      border: none; background: none; color: var(--muted);
      font-size: 13px; font-weight: 500; cursor: pointer;
      text-align: left; transition: background .12s, color .12s;
      font-family: inherit;
    }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active { background: var(--accent2); color: var(--accent); }

    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .7; }
    .nav-item.active svg { opacity: 1; }

    .badge {
      margin-left: auto;
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 20px; min-width: 18px; text-align: center;
    }

    .sidebar-bottom {
      padding: 12px 8px;
      border-top: 1px solid var(--border);
    }

    .client-card {
      padding: 10px 10px; border-radius: 6px;
      background: var(--card); border: 1px solid var(--border);
    }
    .client-name { font-size: 12px; font-weight: 600; }
    .client-status {
      font-size: 11px; color: var(--muted); margin-top: 2px;
      display: flex; align-items: center; gap: 4px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }

    /* ── Main ── */
    .main { margin-left: 220px; flex: 1; min-height: 100vh; }

    /* ── Page header ── */
    .page-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 16px;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }

    .page-title { font-size: 20px; font-weight: 700; letter-spacing: -.4px; }
    .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 7px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid transparent; font-family: inherit;
      transition: opacity .15s, background .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .38; cursor: not-allowed; }
    .btn svg { width: 14px; height: 14px; }

    .btn-primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .btn-primary:hover:not(:disabled) { opacity: .88; }

    .btn-ghost {
      background: transparent; color: var(--muted); border-color: var(--border2);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--faint); background: var(--card); }

    .btn-green {
      background: var(--green2); color: var(--green); border-color: rgba(62,207,142,.25);
    }
    .btn-green:hover:not(:disabled) { background: var(--green); color: #0a1a12; }

    .btn-danger {
      background: var(--red2); color: var(--red); border-color: rgba(239,68,68,.2);
    }
    .btn-danger:hover:not(:disabled) { background: var(--red); color: #fff; }

    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Content ── */
    .content { padding: 24px 28px; }

    .page { display: none; }
    .page.active { display: block; }

    /* ── Stats row ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
    }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Draft list ── */
    .drafts-list { display: flex; flex-direction: column; gap: 10px; }

    .draft-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      transition: border-color .15s;
    }
    .draft-card:hover { border-color: var(--border2); }
    .draft-card.is-posted { opacity: .55; }

    .draft-card-top {
      padding: 14px 16px 10px;
      display: flex; align-items: flex-start; gap: 10px;
    }

    .draft-info { flex: 1; min-width: 0; }

    .draft-badges {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 5px;
    }

    .pill {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      letter-spacing: .2px; white-space: nowrap;
    }
    .pill-client { background: var(--accent2); color: var(--accent); }
    .pill-text   { background: rgba(129,140,248,.12); color: var(--blue); }
    .pill-carousel { background: rgba(251,191,36,.1); color: #fbbf24; }
    .pill-posted { background: var(--green2); color: var(--green); }
    .pill-pending { background: rgba(110,110,138,.12); color: var(--muted); }

    .draft-topic {
      font-size: 11px; color: var(--muted); font-style: italic;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .draft-date { font-size: 11px; color: var(--faint); white-space: nowrap; flex-shrink: 0; }

    .draft-text {
      padding: 0 16px 12px;
      font-size: 13px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      max-height: 180px; overflow: hidden;
      position: relative;
    }
    .draft-text.expanded { max-height: none; }
    .draft-text:not(.expanded)::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
      background: linear-gradient(transparent, var(--card));
      pointer-events: none;
    }

    .expand-btn {
      background: none; border: none; color: var(--accent);
      font-size: 11px; font-weight: 600; cursor: pointer;
      padding: 0 16px 10px; display: block;
      font-family: inherit;
    }
    .expand-btn:hover { opacity: .8; }

    .draft-actions {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }

    .draft-posted-at {
      margin-left: auto; font-size: 11px; color: var(--faint);
    }

    /* ── Divider ── */
    .divider {
      height: 1px; background: var(--border); margin: 20px 0;
    }

    /* ── Generate form ── */
    .generate-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; max-width: 560px;
    }

    .field { margin-bottom: 16px; }
    .field:last-of-type { margin-bottom: 20px; }

    label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--muted); margin-bottom: 6px;
    }

    select, input[type="text"] {
      width: 100%; padding: 9px 12px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border2); border-radius: 7px;
      font-size: 13px; font-family: inherit;
      transition: border-color .15s;
    }
    select:focus, input[type="text"]:focus {
      outline: none; border-color: var(--accent);
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .gen-status {
      display: none; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 7px;
      background: var(--accent2); border: 1px solid rgba(224,105,58,.2);
      font-size: 13px; color: var(--accent); margin-top: 14px;
    }
    .gen-status.active { display: flex; }

    .spinner {
      width: 15px; height: 15px; border-radius: 50%;
      border: 2px solid currentColor; border-top-color: transparent;
      animation: spin .65s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 64px 24px;
      color: var(--muted);
    }
    .empty-icon {
      width: 40px; height: 40px; margin: 0 auto 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-sub { font-size: 12px; }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 50;
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 12px; width: min(640px, 100%);
      max-height: 90vh; display: flex; flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }

    .modal-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .modal-head h2 { font-size: 14px; font-weight: 600; flex: 1; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1;
      border-radius: 4px;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

    .modal-foot {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end;
    }

    textarea {
      width: 100%; min-height: 280px; max-height: 480px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border2); border-radius: 7px;
      padding: 12px; font-size: 13px; line-height: 1.75;
      font-family: inherit; resize: vertical;
      transition: border-color .15s;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    .char-count { font-size: 11px; color: var(--muted); margin-top: 6px; text-align: right; }

    /* ── Carousel preview ── */
    .carousel-preview { margin-top: 10px; }
    .slide-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
    }
    .slide-num { font-size: 10px; color: var(--faint); margin-bottom: 3px; }
    .slide-headline { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .slide-body-text { font-size: 12px; color: var(--muted); line-height: 1.6; }

    /* ── Connection banner ── */
    .conn-banner {
      display: none;
      background: var(--red2); border-bottom: 1px solid rgba(239,68,68,.2);
      padding: 8px 16px; font-size: 12px; color: var(--red);
      text-align: center;
    }
    .conn-banner.show { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 16px; font-size: 13px;
      max-width: 300px; z-index: 100;
      opacity: 0; transform: translateY(6px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(62,207,142,.3); color: var(--green); }
    .toast.error   { border-color: rgba(239,68,68,.3);  color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .sidebar { transform: translateX(-100%); transition: transform .2s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .page-header { padding: 16px 16px 14px; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>

<div id="connBanner" class="conn-banner">
  Cannot reach backend. Check your API URL in <code>config.js</code>.
</div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">✦</div>
        Auto-Poster
      </div>
    </div>

    <nav>
      <div class="nav-group">
        <div class="nav-label">Posts</div>
        <button class="nav-item active" data-page="drafts" onclick="nav('drafts')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="12" height="12" rx="2"/>
            <path d="M5 6h6M5 9h4"/>
          </svg>
          Pending
          <span class="badge" id="pendingCount" style="display:none">0</span>
        </button>
        <button class="nav-item" data-page="history" onclick="nav('history')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="6"/>
            <path d="M8 5v3l2 2"/>
          </svg>
          History
        </button>
      </div>

      <div class="nav-group" style="margin-top:8px">
        <div class="nav-label">Create</div>
        <button class="nav-item" data-page="generate" onclick="nav('generate')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 3v10M3 8h10"/>
          </svg>
          Generate
        </button>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div class="client-card" id="clientCard">
        <div class="client-name" id="clientName">Loading...</div>
        <div class="client-status" id="clientStatus">
          <span class="dot" id="clientDot"></span>
          <span id="clientStatusText">Checking...</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Drafts page -->
    <div id="page-drafts" class="page active">
      <div class="page-header">
        <div>
          <div class="page-title">Pending Drafts</div>
          <div class="page-subtitle" id="draftsSubtitle">Ready to post</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="loadDrafts()">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8a6 6 0 1 0 1.5-4M2 4v4h4"/></svg>
            Refresh
          </button>
          <button class="btn btn-primary btn-sm" onclick="nav('generate')">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
            New post
          </button>
        </div>
      </div>
      <div class="content">
        <div id="draftsList" class="drafts-list"></div>
      </div>
    </div>

    <!-- History page -->
    <div id="page-history" class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Posted History</div>
          <div class="page-subtitle">Published to LinkedIn</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadHistory()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8a6 6 0 1 0 1.5-4M2 4v4h4"/></svg>
          Refresh
        </button>
      </div>
      <div class="content">
        <div id="historyList" class="drafts-list"></div>
      </div>
    </div>

    <!-- Generate page -->
    <div id="page-generate" class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Generate Post</div>
          <div class="page-subtitle">Claude writes in your voice</div>
        </div>
      </div>
      <div class="content">
        <div class="generate-card">
          <div class="field">
            <label>Client</label>
            <select id="genClient" onchange="onClientChange()"></select>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Pillar</label>
              <select id="genPillar">
                <option value="">Claude picks</option>
              </select>
            </div>
            <div class="field">
              <label>Format</label>
              <select id="genFormat">
                <option value="">Auto</option>
                <option value="text">Text</option>
                <option value="list">List</option>
                <option value="story">Story</option>
                <option value="notebook">Notebook</option>
                <option value="carousel">Carousel (PDF)</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Topic seed <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--faint)">(optional — leave blank for Claude to pick)</span></label>
            <input type="text" id="genSeed" placeholder="e.g. FloodReady ward model accuracy" />
          </div>
          <button class="btn btn-primary" id="genBtn" onclick="generate()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 8a5 5 0 1 1-10 0 5 5 0 0 1 10 0ZM8 5v3l2 1.5"/></svg>
            Generate with Claude
          </button>
          <div class="gen-status" id="genStatus">
            <div class="spinner"></div>
            Claude is writing your post...
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Edit modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Edit draft</h2>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <textarea id="editArea" oninput="updateChars()"></textarea>
      <div class="char-count"><span id="charCount">0</span> characters</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeEdit()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API = (() => {
    if (window.BACKEND_URL) return window.BACKEND_URL.replace(/\/$/, '');
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return 'http://localhost:3000';
    // GitHub Pages: no backend on same origin, must set BACKEND_URL in config.js
    return '';
  })();

  // ── State ─────────────────────────────────────────────────────────────────
  let clients = [];
  let editId = null;
  let toastTimer;

  // ── Fetch helper ──────────────────────────────────────────────────────────
  async function api(path, opts = {}) {
    if (!API) throw new Error('Backend URL not set. Update config.js with your Railway URL.');
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
      ...opts,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  function nav(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    document.querySelector(`[data-page="${page}"]`).classList.add('active');
    if (page === 'history') loadHistory();
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    if (!API) {
      document.getElementById('connBanner').classList.add('show');
      document.getElementById('connBanner').textContent =
        'No backend URL set. Edit docs/config.js and set window.BACKEND_URL to your Railway URL.';
      renderEmptyClients();
      return;
    }
    try {
      await Promise.all([loadClients(), loadDrafts()]);
      document.getElementById('connBanner').classList.remove('show');
    } catch {
      document.getElementById('connBanner').classList.add('show');
    }
  }

  // ── Clients ───────────────────────────────────────────────────────────────
  async function loadClients() {
    clients = await api('/api/clients');
    renderClientsUI();
  }

  function renderClientsUI() {
    const c = clients[0];
    if (!c) { renderEmptyClients(); return; }
    document.getElementById('clientName').textContent = c.fullName || c.name;
    const dot = document.getElementById('clientDot');
    const txt = document.getElementById('clientStatusText');
    if (c.tokenValid) {
      dot.className = 'dot green';
      txt.textContent = 'Token valid';
    } else {
      dot.className = 'dot red';
      txt.textContent = 'Token expired';
    }

    const sel = document.getElementById('genClient');
    sel.innerHTML = clients.map(cl =>
      `<option value="${esc(cl.id)}">${esc(cl.name)} (${esc(cl.id)})</option>`
    ).join('');
    onClientChange();
  }

  function renderEmptyClients() {
    document.getElementById('clientName').textContent = 'No clients';
    document.getElementById('clientStatusText').textContent = 'Add a client JSON file';
    document.getElementById('clientDot').className = 'dot';
  }

  function onClientChange() {
    const id = document.getElementById('genClient').value;
    const c = clients.find(x => x.id === id);
    const sel = document.getElementById('genPillar');
    sel.innerHTML = `<option value="">Claude picks</option>` +
      (c ? c.pillars.map(p => `<option value="${esc(p.id)}">${esc(p.label)}</option>`).join('') : '');
  }

  // ── Drafts ────────────────────────────────────────────────────────────────
  async function loadDrafts() {
    const drafts = await api('/api/drafts?status=pending');
    const el = document.getElementById('draftsList');
    const badge = document.getElementById('pendingCount');
    badge.textContent = drafts.length;
    badge.style.display = drafts.length ? '' : 'none';
    document.getElementById('draftsSubtitle').textContent =
      drafts.length === 1 ? '1 draft ready' : `${drafts.length} drafts ready`;
    el.innerHTML = drafts.length
      ? drafts.map(d => draftCard(d)).join('')
      : emptyState('No pending drafts', 'Generate a new post to get started.');
  }

  async function loadHistory() {
    const drafts = await api('/api/drafts?status=posted');
    const el = document.getElementById('historyList');
    el.innerHTML = drafts.length
      ? drafts.map(d => draftCard(d, true)).join('')
      : emptyState('No posts yet', 'Published posts will appear here.');
  }

  function draftCard(d, isHistory = false) {
    const date = fmtDate(d.generatedAt);
    const postedDate = d.postedAt ? fmtDate(d.postedAt) : '';
    const isExpanded = false;

    const carouselHtml = (d.type === 'carousel' && d.carouselData?.slides?.length) ? `
      <div class="carousel-preview">
        ${d.carouselData.slides.slice(0, 2).map(s => `
          <div class="slide-item">
            <div class="slide-num">Slide ${s.id} / ${d.carouselData.slides.length}</div>
            <div class="slide-headline">${esc(s.headline)}</div>
            <div class="slide-body-text">${esc(s.body.slice(0, 100))}${s.body.length > 100 ? '…' : ''}</div>
          </div>
        `).join('')}
        ${d.carouselData.slides.length > 2 ? `<div style="font-size:11px;color:var(--faint);padding:2px 0">+${d.carouselData.slides.length - 2} more slides</div>` : ''}
      </div>
    ` : '';

    const actions = d.posted ? `
      <span class="draft-posted-at">Posted ${postedDate}</span>
    ` : `
      <button class="btn btn-green btn-sm" onclick="postDraft('${d.id}', this)">Post to LinkedIn</button>
      <button class="btn btn-ghost btn-sm" onclick="openEdit('${d.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="deleteDraft('${d.id}', this)">Delete</button>
    `;

    return `
      <div class="draft-card ${d.posted ? 'is-posted' : ''}" id="card-${d.id}">
        <div class="draft-card-top">
          <div class="draft-info">
            <div class="draft-badges">
              <span class="pill pill-client">${esc(d.clientId)}</span>
              <span class="pill ${d.type === 'carousel' ? 'pill-carousel' : 'pill-text'}">${d.type || 'text'}</span>
              <span class="pill ${d.posted ? 'pill-posted' : 'pill-pending'}">${d.posted ? 'posted' : 'pending'}</span>
            </div>
            ${d.topicData?.topic ? `<div class="draft-topic">${esc(d.topicData.topic)}</div>` : ''}
          </div>
          <div class="draft-date">${date}</div>
        </div>
        <div class="draft-text" id="text-${d.id}">${esc(d.postText)}</div>
        <button class="expand-btn" onclick="toggleExpand('${d.id}', this)">Show more</button>
        ${carouselHtml}
        <div class="draft-actions">${actions}</div>
      </div>
    `;
  }

  function toggleExpand(id, btn) {
    const el = document.getElementById(`text-${id}`);
    if (el.classList.contains('expanded')) {
      el.classList.remove('expanded');
      btn.textContent = 'Show more';
    } else {
      el.classList.add('expanded');
      btn.textContent = 'Show less';
    }
  }

  function emptyState(title, sub) {
    return `
      <div class="empty">
        <div class="empty-icon">✦</div>
        <div class="empty-title">${title}</div>
        <div class="empty-sub">${sub}</div>
      </div>
    `;
  }

  // ── Post ──────────────────────────────────────────────────────────────────
  async function postDraft(id, btn) {
    if (!confirm('Post this to LinkedIn now?')) return;
    btn.disabled = true;
    btn.textContent = 'Posting…';
    try {
      await api(`/api/drafts/${id}/post`, { method: 'POST' });
      toast('Posted to LinkedIn!', 'success');
      loadDrafts();
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Post to LinkedIn';
      toast(e.message, 'error');
    }
  }

  async function deleteDraft(id, btn) {
    if (!confirm('Delete this draft?')) return;
    btn.disabled = true;
    try {
      await api(`/api/drafts/${id}`, { method: 'DELETE' });
      document.getElementById(`card-${id}`)?.remove();
      toast('Draft deleted');
      loadDrafts();
    } catch (e) {
      btn.disabled = false;
      toast(e.message, 'error');
    }
  }

  // ── Edit ──────────────────────────────────────────────────────────────────
  function openEdit(id) {
    editId = id;
    const el = document.getElementById(`text-${id}`);
    document.getElementById('editArea').value = el.textContent;
    updateChars();
    document.getElementById('editOverlay').classList.add('open');
  }

  function closeEdit() {
    document.getElementById('editOverlay').classList.remove('open');
    editId = null;
  }

  function updateChars() {
    document.getElementById('charCount').textContent =
      document.getElementById('editArea').value.length;
  }

  async function saveEdit() {
    if (!editId) return;
    const text = document.getElementById('editArea').value;
    try {
      await api(`/api/drafts/${editId}`, {
        method: 'PUT',
        body: JSON.stringify({ postText: text }),
      });
      const el = document.getElementById(`text-${editId}`);
      if (el) el.textContent = text;
      closeEdit();
      toast('Draft saved', 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // ── Generate ──────────────────────────────────────────────────────────────
  async function generate() {
    const clientId = document.getElementById('genClient').value;
    if (!clientId) { toast('Select a client', 'error'); return; }

    const payload = {
      clientId,
      pillarId:  document.getElementById('genPillar').value  || undefined,
      format:    document.getElementById('genFormat').value   || undefined,
      seed:      document.getElementById('genSeed').value.trim() || undefined,
    };

    const btn    = document.getElementById('genBtn');
    const status = document.getElementById('genStatus');
    btn.disabled = true;
    status.classList.add('active');

    try {
      await api('/api/generate', { method: 'POST', body: JSON.stringify(payload) });
      toast('Draft generated!', 'success');
      nav('drafts');
      loadDrafts();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      status.classList.remove('active');
    }
  }

  // ── Utils ─────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleString('en-IN', {
        timeZone: 'Asia/Kolkata',
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    } catch { return iso; }
  }

  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // Close modal on overlay click
  document.getElementById('editOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('editOverlay')) closeEdit();
  });

  init();
</script>
</body>
</html>
