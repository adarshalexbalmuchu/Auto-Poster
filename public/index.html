<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto-Poster</title>
  <style>
    :root {
      --bg: #0e0f12;
      --panel: #16181d;
      --panel2: #1c1f26;
      --border: #262932;
      --text: #e2e4ec;
      --muted: #7a8099;
      --accent: #da6d2d;
      --accent-dim: rgba(218,109,45,0.12);
      --green: #3ecf8e;
      --green-dim: rgba(62,207,142,0.1);
      --red: #e05252;
      --red-dim: rgba(224,82,82,0.1);
      --blue: #6ea8fe;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .main { flex: 1; overflow-y: auto; }

    /* ── Sidebar ── */
    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { color: var(--accent); }
    .sidebar-nav { padding: 12px 0; flex: 1; overflow-y: auto; }
    .nav-section { padding: 0 8px 8px; }
    .nav-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted);
      padding: 8px 12px 4px;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 8px 12px; border-radius: 6px;
      border: none; background: none; color: var(--text);
      font-size: 13px; cursor: pointer; text-align: left;
      transition: background 0.1s;
    }
    .nav-btn:hover { background: var(--panel2); }
    .nav-btn.active { background: var(--accent-dim); color: var(--accent); }
    .nav-btn .badge {
      margin-left: auto; background: var(--accent);
      color: #fff; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 10px;
    }
    .client-section { padding: 12px 8px 0; border-top: 1px solid var(--border); }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px;
    }
    .topbar h1 { font-size: 15px; font-weight: 600; flex: 1; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: 1px solid transparent;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-ghost { background: var(--panel); border-color: var(--border); color: var(--text); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); }
    .btn-danger { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .btn-danger:hover:not(:disabled) { background: var(--red); color: #fff; }
    .btn-green { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .btn-green:hover:not(:disabled) { background: var(--green); color: #1a1a1a; }

    /* ── Content ── */
    .content { padding: 24px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── Draft cards ── */
    .drafts-grid { display: flex; flex-direction: column; gap: 12px; }
    .draft-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      transition: border-color 0.15s;
    }
    .draft-card:hover { border-color: #3a3e4a; }
    .draft-card.posted { opacity: 0.6; }
    .draft-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 0;
    }
    .draft-meta { flex: 1; min-width: 0; }
    .draft-client {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--accent);
    }
    .draft-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .draft-type-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      letter-spacing: 0.3px;
    }
    .draft-type-badge.text { background: rgba(110,168,254,0.12); color: var(--blue); }
    .draft-type-badge.carousel { background: var(--accent-dim); color: var(--accent); }
    .status-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
    }
    .status-badge.posted { background: var(--green-dim); color: var(--green); }
    .status-badge.pending { background: rgba(122,128,153,0.15); color: var(--muted); }
    .draft-topic {
      padding: 8px 16px 0;
      font-size: 12px; color: var(--muted);
      font-style: italic;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .draft-body {
      padding: 10px 16px;
      font-size: 13px; line-height: 1.7; color: var(--text);
      white-space: pre-wrap;
      max-height: 200px; overflow: hidden; position: relative;
    }
    .draft-body.expanded { max-height: none; }
    .draft-body::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
      background: linear-gradient(transparent, var(--panel));
      pointer-events: none;
    }
    .draft-body.expanded::after { display: none; }
    .draft-actions {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
    }
    .draft-posted-info { font-size: 11px; color: var(--muted); margin-left: auto; }

    /* ── Edit modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(700px, 95vw);
      max-height: 90vh;
      display: flex; flex-direction: column;
    }
    .modal-header {
      display: flex; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px; flex: 1; overflow-y: auto; }
    .modal-footer {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end;
    }
    textarea {
      width: 100%; min-height: 300px; max-height: 500px;
      background: var(--panel2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; font-size: 13px; line-height: 1.7;
      font-family: inherit; resize: vertical;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .char-count { font-size: 11px; color: var(--muted); margin-top: 6px; text-align: right; }

    /* ── Generate panel ── */
    .generate-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 24px;
      max-width: 600px;
    }
    .form-row { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    select, input[type="text"] {
      width: 100%; background: var(--panel2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 12px; font-size: 13px;
    }
    select:focus, input[type="text"]:focus { outline: none; border-color: var(--accent); }
    .form-row-inline { display: flex; gap: 12px; }
    .form-row-inline .form-row { flex: 1; margin-bottom: 0; }
    .generating-overlay {
      display: none; align-items: center; gap: 12px;
      padding: 16px; background: var(--accent-dim);
      border-radius: 6px; margin-top: 16px;
      font-size: 13px; color: var(--accent);
    }
    .generating-overlay.active { display: flex; }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid currentColor; border-top-color: transparent;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--panel2); border: 1px solid var(--border);
      padding: 10px 16px; border-radius: 8px; font-size: 13px;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 200; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* ── Empty state ── */
    .empty { padding: 64px 24px; text-align: center; color: var(--muted); }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── Carousel slides preview ── */
    .carousel-slides { margin-top: 12px; }
    .slide-preview {
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
    }
    .slide-num { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .slide-headline { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .slide-body-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Auto<span>·</span>Poster</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Posts</div>
        <button class="nav-btn active" data-page="pending" onclick="showPage('pending')">
          Pending drafts
          <span class="badge" id="pendingBadge">0</span>
        </button>
        <button class="nav-btn" data-page="history" onclick="showPage('history')">
          Posted history
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Tools</div>
        <button class="nav-btn" data-page="generate" onclick="showPage('generate')">
          Generate new post
        </button>
      </div>
      <div class="client-section">
        <div class="nav-label">Clients</div>
        <div id="clientList"></div>
      </div>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="main">
    <!-- Pending drafts -->
    <div id="page-pending" class="page active">
      <div class="topbar">
        <h1>Pending Drafts</h1>
        <button class="btn btn-ghost" onclick="loadDrafts()">Refresh</button>
      </div>
      <div class="content">
        <div id="pendingDrafts" class="drafts-grid"></div>
      </div>
    </div>

    <!-- History -->
    <div id="page-history" class="page">
      <div class="topbar">
        <h1>Posted History</h1>
        <button class="btn btn-ghost" onclick="loadHistory()">Refresh</button>
      </div>
      <div class="content">
        <div id="historyDrafts" class="drafts-grid"></div>
      </div>
    </div>

    <!-- Generate -->
    <div id="page-generate" class="page">
      <div class="topbar">
        <h1>Generate New Post</h1>
      </div>
      <div class="content">
        <div class="generate-panel">
          <div class="form-row">
            <label>Client</label>
            <select id="genClient"></select>
          </div>
          <div class="form-row-inline">
            <div class="form-row">
              <label>Pillar (optional)</label>
              <select id="genPillar">
                <option value="">Claude picks</option>
              </select>
            </div>
            <div class="form-row">
              <label>Format</label>
              <select id="genFormat">
                <option value="">Auto</option>
                <option value="text">Text post</option>
                <option value="list">List post</option>
                <option value="story">Story</option>
                <option value="notebook">Notebook entry</option>
                <option value="carousel">Carousel (PDF)</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <label>Topic seed (optional — leave blank for Claude to pick)</label>
            <input type="text" id="genSeed" placeholder="e.g. FloodReady Delhi ward model accuracy" />
          </div>
          <button class="btn btn-primary" onclick="generatePost()" id="genBtn">
            Generate with Claude
          </button>
          <div class="generating-overlay" id="genOverlay">
            <div class="spinner"></div>
            Generating post...
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit Draft</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <textarea id="editTextarea" oninput="updateCharCount()"></textarea>
      <div class="char-count"><span id="charCount">0</span> characters</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  let clients = [];
  let currentEditId = null;

  // ── Init ──────────────────────────────────────────────────────────────────

  async function init() {
    await Promise.all([loadClients(), loadDrafts()]);
  }

  async function loadClients() {
    try {
      const res = await fetch('/api/clients');
      clients = await res.json();
      renderClients();
      populateClientSelect();
    } catch {}
  }

  function renderClients() {
    const el = document.getElementById('clientList');
    el.innerHTML = clients.map(c => `
      <div style="padding: 8px 12px; font-size: 12px;">
        <div style="font-weight: 600; color: var(--text)">${c.name}</div>
        <div style="color: var(--muted); font-size: 11px; margin-top: 2px;">
          ${c.tokenValid
            ? `<span style="color:var(--green)">● Token valid</span>`
            : `<span style="color:var(--red)">● No token</span>`}
          · ${c.pillars.length} pillars
        </div>
      </div>
    `).join('');
  }

  function populateClientSelect() {
    const sel = document.getElementById('genClient');
    sel.innerHTML = clients.map(c => `<option value="${c.id}">${c.name} (${c.id})</option>`).join('');
    if (clients[0]) updatePillarSelect(clients[0]);
    sel.onchange = () => {
      const c = clients.find(x => x.id === sel.value);
      if (c) updatePillarSelect(c);
    };
  }

  function updatePillarSelect(client) {
    const sel = document.getElementById('genPillar');
    sel.innerHTML = `<option value="">Claude picks</option>` +
      client.pillars.map(p => `<option value="${p.id}">${p.label}</option>`).join('');
  }

  // ── Pages ─────────────────────────────────────────────────────────────────

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    document.querySelector(`[data-page="${name}"]`).classList.add('active');

    if (name === 'history') loadHistory();
  }

  // ── Drafts ────────────────────────────────────────────────────────────────

  async function loadDrafts() {
    const res = await fetch('/api/drafts?status=pending');
    const drafts = await res.json();
    const el = document.getElementById('pendingDrafts');
    const badge = document.getElementById('pendingBadge');
    badge.textContent = drafts.length;
    badge.style.display = drafts.length ? '' : 'none';
    el.innerHTML = drafts.length ? drafts.map(renderDraftCard).join('') : emptyState('No pending drafts', 'Run generate to create one.');
  }

  async function loadHistory() {
    const res = await fetch('/api/drafts?status=posted');
    const drafts = await res.json();
    const el = document.getElementById('historyDrafts');
    el.innerHTML = drafts.length ? drafts.map(d => renderDraftCard(d, true)).join('') : emptyState('No posts yet', 'Posts will appear here once published.');
  }

  function renderDraftCard(d, isHistory = false) {
    const date = new Date(d.generatedAt).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const postedDate = d.postedAt ? new Date(d.postedAt).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    const truncatedText = d.postText;

    const carouselPreview = (d.type === 'carousel' && d.carouselData?.slides) ? `
      <div class="carousel-slides">
        ${d.carouselData.slides.slice(0,2).map(s => `
          <div class="slide-preview">
            <div class="slide-num">Slide ${s.id} of ${d.carouselData.slides.length}</div>
            <div class="slide-headline">${esc(s.headline)}</div>
            <div class="slide-body-text">${esc(s.body.slice(0,120))}${s.body.length > 120 ? '…' : ''}</div>
          </div>
        `).join('')}
        ${d.carouselData.slides.length > 2 ? `<div style="font-size:11px;color:var(--muted);padding:4px 0">+${d.carouselData.slides.length - 2} more slides</div>` : ''}
      </div>
    ` : '';

    const actions = d.posted ? `
      <span class="draft-posted-info">Posted ${postedDate}</span>
      ${d.linkedInPostId ? `<span style="font-size:11px;color:var(--muted)">ID: ${d.linkedInPostId}</span>` : ''}
    ` : `
      <button class="btn btn-green" onclick="postDraft('${d.id}', this)">Post to LinkedIn</button>
      <button class="btn btn-ghost" onclick="openEdit('${d.id}', this)">Edit</button>
      <button class="btn btn-danger" onclick="deleteDraft('${d.id}', this)" style="margin-left:auto">Delete</button>
    `;

    return `
      <div class="draft-card ${d.posted ? 'posted' : ''}" id="card-${d.id}">
        <div class="draft-header">
          <div class="draft-meta">
            <div class="draft-client">${esc(d.clientId)}</div>
            <div class="draft-date">${date} IST</div>
          </div>
          <span class="draft-type-badge ${d.type || 'text'}">${d.type === 'carousel' ? 'carousel' : 'text'}</span>
          <span class="status-badge ${d.posted ? 'posted' : 'pending'}">${d.posted ? 'posted' : 'pending'}</span>
        </div>
        ${d.topicData?.topic ? `<div class="draft-topic">${esc(d.topicData.topic)}</div>` : ''}
        <div class="draft-body" id="body-${d.id}">${esc(truncatedText)}</div>
        ${carouselPreview}
        <div class="draft-actions">${actions}</div>
      </div>
    `;
  }

  function emptyState(title, sub) {
    return `<div class="empty"><div class="icon">✦</div><div style="font-weight:600;margin-bottom:4px">${title}</div><div style="font-size:12px">${sub}</div></div>`;
  }

  // ── Post ──────────────────────────────────────────────────────────────────

  async function postDraft(id, btn) {
    if (!confirm('Post this draft to LinkedIn now?')) return;
    btn.disabled = true;
    btn.textContent = 'Posting...';
    try {
      const res = await fetch(`/api/drafts/${id}/post`, { method: 'POST' });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      toast('Posted to LinkedIn!', 'success');
      loadDrafts();
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Post to LinkedIn';
      toast(e.message, 'error');
    }
  }

  async function deleteDraft(id, btn) {
    if (!confirm('Delete this draft?')) return;
    btn.disabled = true;
    try {
      await fetch(`/api/drafts/${id}`, { method: 'DELETE' });
      document.getElementById(`card-${id}`)?.remove();
      toast('Draft deleted');
      loadDrafts();
    } catch {
      btn.disabled = false;
    }
  }

  // ── Edit ──────────────────────────────────────────────────────────────────

  function openEdit(id) {
    const bodyEl = document.getElementById(`body-${id}`);
    currentEditId = id;
    const ta = document.getElementById('editTextarea');
    ta.value = bodyEl.textContent;
    updateCharCount();
    document.getElementById('editModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('open');
    currentEditId = null;
  }

  function updateCharCount() {
    const ta = document.getElementById('editTextarea');
    document.getElementById('charCount').textContent = ta.value.length;
  }

  async function saveEdit() {
    if (!currentEditId) return;
    const text = document.getElementById('editTextarea').value;
    try {
      await fetch(`/api/drafts/${currentEditId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ postText: text }),
      });
      const bodyEl = document.getElementById(`body-${currentEditId}`);
      if (bodyEl) bodyEl.textContent = text;
      closeModal();
      toast('Draft updated', 'success');
    } catch {
      toast('Save failed', 'error');
    }
  }

  // ── Generate ──────────────────────────────────────────────────────────────

  async function generatePost() {
    const clientId = document.getElementById('genClient').value;
    const pillarId = document.getElementById('genPillar').value;
    const format = document.getElementById('genFormat').value;
    const seed = document.getElementById('genSeed').value.trim();

    if (!clientId) { toast('Select a client', 'error'); return; }

    const btn = document.getElementById('genBtn');
    const overlay = document.getElementById('genOverlay');
    btn.disabled = true;
    overlay.classList.add('active');

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, pillarId: pillarId || undefined, format: format || undefined, seed: seed || undefined }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      toast('Draft generated!', 'success');
      showPage('pending');
      loadDrafts();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      overlay.classList.remove('active');
    }
  }

  // ── Utils ─────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  document.getElementById('editModal').addEventListener('click', e => {
    if (e.target === document.getElementById('editModal')) closeModal();
  });

  init();
</script>
</body>
</html>
