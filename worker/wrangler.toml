name = "auto-poster-webhook"
main = "index.js"
compatibility_date = "2024-09-23"

[vars]
GITHUB_REPO = "adarshalexbalmuchu/Auto-Poster"

[observability.logs]
enabled = true

[[kv_namespaces]]
binding = "STATE"
id = "7184454afd984de8b46e788fdf689a2a"

# Secrets — set these via: wrangler secret put <NAME>
# WHATSAPP_VERIFY_TOKEN
# WHATSAPP_APP_SECRET      — Meta app secret (Settings → Basic → App Secret)
# WHATSAPP_ACCESS_TOKEN
# WHATSAPP_PHONE_NUMBER_ID
# WHATSAPP_OWNER_NUMBER
# GITHUB_TOKEN
# WORKER_CALLBACK_SECRET   — shared secret for internal callbacks from GitHub Actions
