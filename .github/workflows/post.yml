name: Post to LinkedIn

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client ID (irfan / alex — filters to their latest draft)'
        required: false
      draft_path:
        description: 'Exact draft file path (leave blank to auto-find latest)'
        required: false

permissions: {}

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Find draft
        id: draft
        env:
          INPUT_CLIENT:     ${{ inputs.client }}
          INPUT_DRAFT_PATH: ${{ inputs.draft_path }}
        run: |
          set -e
          if [ -n "${INPUT_DRAFT_PATH}" ]; then
            echo "path=${INPUT_DRAFT_PATH}" >> $GITHUB_OUTPUT
          else
            PATTERN="drafts/*.json"
            [ -n "${INPUT_CLIENT}" ] && PATTERN="drafts/*-${INPUT_CLIENT}.json"
            LATEST=$(ls -t ${PATTERN} 2>/dev/null | while IFS= read -r f; do
              node -e "const d=JSON.parse(require('fs').readFileSync(process.argv[1])); if(!d.posted){console.log(process.argv[1]);process.exit(0);}" "$f"
            done | head -1)
            if [ -z "$LATEST" ]; then
              echo "No pending drafts found."
              exit 1
            fi
            echo "path=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Post to LinkedIn
        env:
          IRFAN_LINKEDIN_ACCESS_TOKEN:     ${{ secrets.IRFAN_LINKEDIN_ACCESS_TOKEN }}
          IRFAN_LINKEDIN_PERSON_URN:       ${{ secrets.IRFAN_LINKEDIN_PERSON_URN }}
          IRFAN_LINKEDIN_TOKEN_EXPIRES_AT: ${{ secrets.IRFAN_LINKEDIN_TOKEN_EXPIRES_AT }}
          ALEX_LINKEDIN_ACCESS_TOKEN:      ${{ secrets.ALEX_LINKEDIN_ACCESS_TOKEN }}
          ALEX_LINKEDIN_PERSON_URN:        ${{ secrets.ALEX_LINKEDIN_PERSON_URN }}
          ALEX_LINKEDIN_TOKEN_EXPIRES_AT:  ${{ secrets.ALEX_LINKEDIN_TOKEN_EXPIRES_AT }}
          INPUT_DRAFT_PATH:                ${{ steps.draft.outputs.path }}
        run: node src/post.js --draft "${INPUT_DRAFT_PATH}"

      - name: Commit posted status
        run: |
          set -e
          git config user.name  "Auto-Poster Bot"
          git config user.email "bot@auto-poster.local"
          git add -f drafts/
          if ! git diff --staged --quiet; then
            git stash --keep-index 2>/dev/null || true
            git commit -m "posted: $(date -u +%Y-%m-%dT%H:%M:%S)"
            git pull --rebase origin main
            git push
          fi
