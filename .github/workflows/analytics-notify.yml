name: Analytics Notify

on:
  schedule:
    - cron: '30 8 * * *'   # 08:30 UTC = 14:00 IST
  workflow_dispatch:

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Send 24h stats
        env:
          IRFAN_LINKEDIN_ACCESS_TOKEN:  ${{ secrets.IRFAN_LINKEDIN_ACCESS_TOKEN }}
          IRFAN_LINKEDIN_PERSON_URN:    ${{ secrets.IRFAN_LINKEDIN_PERSON_URN }}
          ALEX_LINKEDIN_ACCESS_TOKEN:   ${{ secrets.ALEX_LINKEDIN_ACCESS_TOKEN }}
          ALEX_LINKEDIN_PERSON_URN:     ${{ secrets.ALEX_LINKEDIN_PERSON_URN }}
          WHATSAPP_ACCESS_TOKEN:        ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID:     ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_RECIPIENT_NUMBER:    ${{ secrets.WHATSAPP_RECIPIENT_NUMBER }}
        run: node src/notify-stats.js
