name: Generate Post

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client ID'
        default: 'irfan'
        required: false
      pillar:
        description: 'Pillar ID (leave blank for Claude to pick)'
        required: false
      format:
        description: 'Format: text / list / story / notebook'
        default: 'text'
        required: false
      seed:
        description: 'Topic seed (leave blank for Claude to pick)'
        required: false
      phone:
        description: 'WhatsApp phone number to notify (E.164, no +)'
        required: false

permissions: {}

concurrency:
  group: auto-poster-git
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Generate post
        env:
          ANTHROPIC_API_KEY:                ${{ secrets.ANTHROPIC_API_KEY }}
          IRFAN_LINKEDIN_ACCESS_TOKEN:      ${{ secrets.IRFAN_LINKEDIN_ACCESS_TOKEN }}
          IRFAN_LINKEDIN_PERSON_URN:        ${{ secrets.IRFAN_LINKEDIN_PERSON_URN }}
          IRFAN_LINKEDIN_TOKEN_EXPIRES_AT:  ${{ secrets.IRFAN_LINKEDIN_TOKEN_EXPIRES_AT }}
          ALEX_LINKEDIN_ACCESS_TOKEN:       ${{ secrets.ALEX_LINKEDIN_ACCESS_TOKEN }}
          ALEX_LINKEDIN_PERSON_URN:         ${{ secrets.ALEX_LINKEDIN_PERSON_URN }}
          ALEX_LINKEDIN_TOKEN_EXPIRES_AT:   ${{ secrets.ALEX_LINKEDIN_TOKEN_EXPIRES_AT }}
          WHATSAPP_ACCESS_TOKEN:            ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID:         ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_RECIPIENT_NUMBER:        ${{ secrets.WHATSAPP_RECIPIENT_NUMBER }}
          WORKER_URL:                       ${{ secrets.WORKER_URL }}
          WORKER_CALLBACK_SECRET:           ${{ secrets.WORKER_CALLBACK_SECRET }}
          INPUT_CLIENT:                     ${{ inputs.client || 'irfan' }}
          INPUT_PILLAR:                     ${{ inputs.pillar }}
          INPUT_FORMAT:                     ${{ inputs.format }}
          INPUT_SEED:                       ${{ inputs.seed }}
          INPUT_PHONE:                      ${{ inputs.phone }}
        run: node src/run.js

      - name: Commit draft
        run: |
          set -e
          git config user.name  "Auto-Poster Bot"
          git config user.email "bot@auto-poster.local"
          git add -f drafts/*.json
          if ! git diff --staged --quiet; then
            git commit -m "draft: $(date -u +%Y-%m-%dT%H:%M:%S)"
            git pull --rebase origin main
            git push
          fi
